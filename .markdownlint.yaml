# Markdown Linting Configuration for CLI Repository
# Aligned with Jetscale-ai/Governance .markdownlint.yaml

default: true

# Let prettier handle formatting concerns
MD004: false
MD007: false
MD012: false
MD013: false
MD026: false
MD030: false
MD031: false
MD032: false
MD046: false
MD047: false
MD049: false
MD050: false

# Allow multiple headers with same content (e.g. repeated "Status" in tables)
MD024:
  siblings_only: true

# Allow multiple H1s in documentation
MD025: false

# Allow inline HTML for tables and details blocks
MD033:
  allowed_elements: [br, sub, sup, details, summary]

# Allow bare URLs in docs
MD034: false

# First line need not be a top-level header
MD041: false
