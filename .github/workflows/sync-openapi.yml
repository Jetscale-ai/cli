name: Sync OpenAPI Spec

on:
  repository_dispatch:
    types: [openapi-spec-updated]

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install oapi-codegen
        run: go install github.com/oapi-codegen/oapi-codegen/v2/cmd/oapi-codegen@latest

      - name: Fetch OpenAPI spec from Backend
        env:
          GH_TOKEN: ${{ secrets.BACKEND_REPO_TOKEN }}
        run: |
          SPEC_SHA="${{ github.event.client_payload.spec_sha }}"
          SPEC_VERSION="${{ github.event.client_payload.spec_version }}"
          echo "Fetching spec (version: ${SPEC_VERSION:-unknown}, sha: ${SPEC_SHA:-unknown})"

          gh api repos/Jetscale-ai/Backend/actions/artifacts \
            --jq '.artifacts[] | select(.name == "openapi-spec") | .archive_download_url' \
            | head -1 \
            | xargs -I{} gh api {} > /tmp/spec.zip

          unzip -o /tmp/spec.zip -d openapi/
          echo "SPEC_VERSION=${SPEC_VERSION}" >> "$GITHUB_ENV"

      - name: Regenerate client
        run: make generate

      - name: Run tests
        run: make test

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet internal/api/generated/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create PR
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="chore/sync-openapi-${SPEC_VERSION:-$(date +%Y%m%d%H%M%S)}"
          git checkout -b "$BRANCH"
          git add openapi/ internal/api/generated/
          git commit -m "chore: sync OpenAPI spec from Backend ${SPEC_VERSION}"
          git push origin "$BRANCH"
          gh pr create \
            --title "chore: sync OpenAPI from Backend ${SPEC_VERSION}" \
            --body "Auto-generated by sync-openapi workflow.

          Spec version: ${SPEC_VERSION:-unknown}
          Triggered by: repository_dispatch from Backend CI" \
            --base main \
            --head "$BRANCH"
