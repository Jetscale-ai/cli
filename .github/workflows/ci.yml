name: CI
run-name: ${{ github.event_name == 'pull_request' && format('CI — {0}', github.event.pull_request.title) || 'CI' }}

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".gitignore"
      - "LICENSE"
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.ref == 'refs/heads/main' && 'main-release-pipeline' || format('pr-{0}', github.event.pull_request.number || github.run_id) }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@v9

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go test -race -coverprofile=coverage.out ./...
      - name: Upload coverage
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v6
        with:
          name: coverage
          path: coverage.out

  build:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: [lint, test]
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: go build -o /dev/null ./cmd/jetscale

  release:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.JETSCALEBOT_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
          ref: ${{ github.ref }}

      - name: Verify checkout
        run: |
          echo "Trigger SHA: ${GITHUB_SHA}"
          echo "Checked out: $(git rev-parse HEAD)"
          if [ "$(git rev-parse HEAD)" != "${GITHUB_SHA}" ]; then
            echo "Building current main tip (queued run caught up to newer commits)"
          fi

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Calculate Next Version
        id: semrel
        uses: go-semantic-release/action@v1
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          github-token: ${{ secrets.JETSCALEBOT_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
          dry: true
          allow-initial-development-versions: true
          force-bump-patch-version: true

      - name: Tag Release
        if: steps.semrel.outputs.version != ''
        env:
          VERSION: ${{ steps.semrel.outputs.version }}
          GH_TOKEN: ${{ secrets.JETSCALEBOT_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "jetscalebot"
          git config user.email "devops@jetscale.ai"

          # go-semantic-release leaves behind artifacts that dirty the tree
          rm -rf .semrel .generated-go-semantic-release-changelog.md
          git checkout -- .

          git tag "v${VERSION}"
          git push origin "v${VERSION}"

      - name: Release with GoReleaser
        if: steps.semrel.outputs.version != ''
        uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.JETSCALEBOT_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: v${{ steps.semrel.outputs.version }}
