version: 2

project_name: jetscale

builds:
  - id: jetscale
    main: ./cmd/jetscale
    binary: jetscale
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/Jetscale-ai/cli/internal/cmd.version={{.Version}}
      - -X github.com/Jetscale-ai/cli/internal/cmd.commit={{.ShortCommit}}
      - -X github.com/Jetscale-ai/cli/internal/cmd.date={{.Date}}

archives:
  - id: default
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  github:
    owner: Jetscale-ai
    name: cli
  draft: false
  prerelease: auto

brews:
  - repository:
      owner: Jetscale-ai
      name: homebrew-tap
    directory: Formula
    homepage: "https://jetscale.ai"
    description: "JetScale CLI — cloud cost optimization from the terminal"
    license: "Proprietary"
    install: |
      bin.install "jetscale"
    test: |
      system "#{bin}/jetscale", "version"
